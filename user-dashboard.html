<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Virtual Lab</title>
    <link rel="stylesheet" href="auth-style.css">
    <style>
        body { background: #f4f7fb; }
        .page { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,.08); margin-bottom: 16px; }
        .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .grid { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 12px; }
        .kpi-label { color: #6b7280; font-size: 13px; }
        .kpi-value { font-size: 28px; font-weight: 700; color: #111827; }
        .btn { border: 0; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-secondary { background: #e5e7eb; color: #111827; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: 14px; }
        .muted { color: #6b7280; }
        .status { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-in_progress { background: #dbeafe; color: #1d4ed8; }
        .status-not_started { background: #f3f4f6; color: #374151; }
        .actions { display: flex; gap: 8px; }
        @media (max-width: 960px) {
            .grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="card top">
        <div>
            <h2 id="welcome">Student Dashboard</h2>
            <p id="profile" class="muted">Loading profile...</p>
        </div>
        <div class="actions">
            <button class="btn btn-primary" id="open-lab-btn">Open Lab</button>
            <button class="btn btn-primary" id="refresh-btn">Refresh</button>
            <button class="btn btn-secondary" id="logout-btn">Logout</button>
        </div>
    </div>

    <div class="grid">
        <div class="card"><div class="kpi-label">Experiments</div><div class="kpi-value" id="k-total">0</div></div>
        <div class="card"><div class="kpi-label">Completed</div><div class="kpi-value" id="k-completed">0</div></div>
        <div class="card"><div class="kpi-label">Avg Mastery</div><div class="kpi-value" id="k-mastery">0%</div></div>
        <div class="card"><div class="kpi-label">Avg Duration</div><div class="kpi-value" id="k-duration">0m</div></div>
    </div>

    <div class="card">
        <h3>Recent Assessments</h3>
        <p id="assess-empty" class="muted">Loading assessments...</p>
        <table id="assess-table" style="display:none;">
            <thead>
            <tr>
                <th>Experiment</th>
                <th>Type</th>
                <th>Score</th>
                <th>Accuracy</th>
                <th>Completed</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h3>Module Progress</h3>
        <p id="progress-empty" class="muted">Loading progress...</p>
        <table id="progress-table" style="display:none;">
            <thead>
            <tr>
                <th>Experiment</th>
                <th>Module</th>
                <th>Status</th>
                <th>Progress</th>
                <th>Attempts</th>
                <th>Last Access</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="api-client.js"></script>
<script>
(function() {
    const token = localStorage.getItem('authToken') || localStorage.getItem('lab_auth_token');
    if (!token) {
        window.location.href = 'login.html';
        return;
    }

    function fmtDate(value) {
        if (!value) return '-';
        const d = new Date(value);
        return Number.isNaN(d.getTime()) ? '-' : d.toLocaleString();
    }

    function setProfile(user) {
        const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim() || user.email || 'Student';
        document.getElementById('welcome').textContent = `Welcome, ${fullName}`;
        document.getElementById('profile').textContent = `${user.email || ''} | ${user.institution || 'Institution not set'}`;
    }

    function setKpis(summary) {
        document.getElementById('k-total').textContent = summary.total_experiments || 0;
        document.getElementById('k-completed').textContent = summary.completed_experiments || 0;
        document.getElementById('k-mastery').textContent = `${Math.round(Number(summary.avg_mastery_score || 0))}%`;
        document.getElementById('k-duration').textContent = `${Math.round(Number(summary.avg_duration_minutes || 0))}m`;
    }

    function renderAssessments(items) {
        const table = document.getElementById('assess-table');
        const empty = document.getElementById('assess-empty');
        const tbody = table.querySelector('tbody');

        tbody.innerHTML = '';
        if (!Array.isArray(items) || items.length === 0) {
            empty.textContent = 'No assessment attempts yet.';
            table.style.display = 'none';
            return;
        }

        items.forEach((item) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.experiment_name || item.experiment_key || '-'}</td>
                <td>${item.assessment_type || '-'}</td>
                <td>${Number(item.total_score || 0)} / ${Number(item.max_score || 0)}</td>
                <td>${Math.round(Number(item.accuracy_percentage || 0))}%</td>
                <td>${fmtDate(item.completed_at)}</td>
            `;
            tbody.appendChild(tr);
        });

        empty.textContent = '';
        table.style.display = 'table';
    }

    function renderProgress(items) {
        const table = document.getElementById('progress-table');
        const empty = document.getElementById('progress-empty');
        const tbody = table.querySelector('tbody');

        tbody.innerHTML = '';
        if (!Array.isArray(items) || items.length === 0) {
            empty.textContent = 'No module progress data yet.';
            table.style.display = 'none';
            return;
        }

        items.forEach((item) => {
            const status = String(item.status || 'not_started');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.experiment_name || item.experiment_key || '-'}</td>
                <td>${item.module_title || item.module_key || '-'}</td>
                <td><span class="status status-${status}">${status.replace('_', ' ')}</span></td>
                <td>${Math.round(Number(item.progress_percentage || 0))}%</td>
                <td>${Number(item.attempt_count || 0)}</td>
                <td>${fmtDate(item.last_accessed_at)}</td>
            `;
            tbody.appendChild(tr);
        });

        empty.textContent = '';
        table.style.display = 'table';
    }

    async function loadDashboard() {
        try {
            const me = await window.labAPI.getProfile();
            const role = String(me?.user?.role || '').toLowerCase();
            if (role === 'teacher') {
                window.location.href = 'teacher-dashboard.html';
                return;
            }
            if (role === 'admin') {
                window.location.href = 'admin-dashboard.html';
                return;
            }

            const data = await window.labAPI.getStudentDashboard();
            setProfile(data.user || {});
            setKpis(data.summary || {});
            renderAssessments(data.assessments || []);
            renderProgress(data.module_progress || []);
        } catch (err) {
            document.getElementById('profile').textContent = `Failed to load dashboard: ${err.message}`;
            document.getElementById('assess-empty').textContent = 'Unable to load assessments.';
            document.getElementById('progress-empty').textContent = 'Unable to load progress.';
        }
    }

    document.getElementById('open-lab-btn').addEventListener('click', () => {
        window.location.href = 'index.html';
    });

    document.getElementById('refresh-btn').addEventListener('click', loadDashboard);
    document.getElementById('logout-btn').addEventListener('click', () => {
        window.labAPI.logout();
        window.location.href = 'login.html';
    });

    loadDashboard();
})();
</script>
</body>
</html>
